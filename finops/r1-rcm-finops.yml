meters:
  - name: services_contract
    description: Revenue-cycle services contract; pricing usually scales with collected revenue and
      service scope rather than API calls.
    unit: varies
    aggregation: sum
    dimensions:
      - contract
principles:
  - name: Visibility
    description: Surface R1 RCM spend through the customer-side procurement and finance systems; the
      vendor does not publish a self-serve usage API.
  - name: Allocation
    description: Allocate the services fee against the patient-financial-services and revenue-cycle
      cost centers covered by the contract.
  - name: Optimization
    description: Optimization happens at services contract renewal; review collection-rate and DSO performance
      against the agreed service levels.
  - name: Accountability
    description: Finance and revenue-cycle leadership co-own the R1 RCM relationship; clinical IT routes
      integration changes through the R1 account team.
